spring:
  # TODO (W3 review): тест-профиль create-drop смотрит на ту же БД tracker_db, что и dev → прогон тестов
  #   снесёт реальные таблицы. Завести отдельную tracker_test_db (лучше Testcontainers). Плюс миграции
  #   Flyway тут не покрыты (flyway off) — добавить тест на ddl-auto=validate против Flyway-схемы.
  datasource:
    url: jdbc:postgresql://localhost:5432/tracker_db
    username: tracker_user
    password: tracker_pass
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
    open-in-view: false
  flyway:
    enabled: false