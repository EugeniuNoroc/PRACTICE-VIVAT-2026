spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/tracker_db
    username: tracker_user
    password: tracker_pass
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true
    open-in-view: false
  flyway:
    enabled: false